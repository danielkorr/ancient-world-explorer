<!DOCTYPE html>
<!-- Source for the Open Graph share card → /og-image.png (1200x630). Not loaded
     by the app. To (re)generate the PNG: open this file in a browser, set the
     window/devtools viewport to exactly 1200x630, and screenshot the .card; save
     as og-image.png in the repo root. (Headless screenshot also works when the
     local browser tooling is healthy.) -->
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@300;400&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1200px; height:630px; }
  .card {
    width:1200px; height:630px;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(212,168,83,0.10) 0%, rgba(17,10,0,0) 55%),
      #110a00;
    border-top:8px solid #d4a853;
    border-bottom:8px solid #d4a853;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-family:'Inter',sans-serif; color:#e8dcc2; position:relative;
  }
  .frame { position:absolute; inset:34px; border:1px solid rgba(212,168,83,0.22); }
  .wordmark {
    font-family:'Cinzel',serif; font-weight:700; font-size:210px; color:#d4a853;
    letter-spacing:22px; line-height:1; text-indent:22px;
    text-shadow:0 0 40px rgba(212,168,83,0.25);
  }
  .subtitle {
    font-family:'Cinzel',serif; font-weight:600; font-size:42px; color:#d4a853;
    letter-spacing:16px; text-indent:16px; margin-top:22px;
  }
  .rule { width:120px; height:2px; background:rgba(212,168,83,0.5); margin:34px 0; }
  .tagline { font-size:30px; font-weight:300; letter-spacing:0.5px; color:#e8dcc2; }
</style>
</head>
<body>
  <div class="card">
    <div class="frame"></div>
    <div class="wordmark">VIA</div>
    <div class="subtitle">ANCIENT WORLD EXPLORER</div>
    <div class="rule"></div>
    <div class="tagline">Explore the Roman world. Help close the gaps in the record.</div>
  </div>
</body>
</html>
